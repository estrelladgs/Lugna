version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lugna_db
    environment:
      POSTGRES_USER: lugna
      POSTGRES_PASSWORD: lugna_pass
      POSTGRES_DB: lugna_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lugna -d lugna_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: lugna_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://lugna:lugna_pass@db:5432/lugna_db
      SECRET_KEY: lugna-secret-key-desarrollo-local-2025-cambiar-en-produccion
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
