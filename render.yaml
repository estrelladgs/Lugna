databases:
  - name: lugna-db
    plan: free
    databaseName: lugna_db
    user: lugna

services:
  - type: web
    name: lugna-api
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lugna-db
          property: connectionString
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      # Los siguientes se rellenan a mano en el dashboard de Render (no viven en git):
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  - type: web
    name: lugna-web
    runtime: static
    plan: free
    rootDir: app
    buildCommand: npm install && npx expo export -p web
    staticPublishPath: dist
    envVars:
      # Rellenar tras el primer deploy de lugna-api con su URL pública
      # (ej. https://lugna-api.onrender.com). Cambiar este valor dispara un rebuild.
      - key: EXPO_PUBLIC_API_URL
        sync: false
